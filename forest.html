<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FOREST</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FOREST">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000;
  --text:#fff;
  --border:#fff;
  --muted:#666;
  --surface:#000;
  --mono:ui-monospace,'Cascadia Code','Menlo','Consolas',monospace;
  --header-fs:16px;
  --body-fs:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{display:flex;flex-direction:column;height:100dvh;}

/* ── HEADER ── */
.hdr{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-cell{padding:14px 10px;font-size:var(--header-fs);font-weight:bold;letter-spacing:0.08em;text-align:center;text-transform:uppercase;}
.hdr-cell:not(:last-child){border-right:1px solid var(--border);}
.hdr-alerts{cursor:pointer;letter-spacing:0.2em;}

/* ── NAV ── */
.nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-btn{flex:1;background:none;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:10px 4px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;text-align:center;transition:color 0.15s;}
.nav-btn:last-child{border-right:none;}
.nav-btn.active{color:var(--text);}

/* ── VIEWS ── */
.view{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}

/* ── BOTTOM INPUT BAR ── */
.input-bar{flex-shrink:0;border-top:1px solid var(--border);display:flex;}
.seed-input{flex:1;background:var(--bg);border:none;color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:14px 16px;outline:none;resize:none;}
.seed-input::placeholder{color:var(--muted);}
.seed-submit{background:none;border:none;border-left:1px solid var(--border);color:var(--text);font-size:18px;padding:0 20px;cursor:pointer;flex-shrink:0;}

/* ── OVERLAY / MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:none;}
.overlay.open{display:flex;align-items:flex-end;}
.modal{background:var(--bg);border:1px solid var(--border);border-bottom:none;width:100%;padding:20px 18px 32px;animation:slideUp 0.2s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-label{font-size:11px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cat-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:16px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;text-align:center;}
.cat-btn.full{grid-column:1/-1;}
.cat-btn:active{background:var(--text);color:var(--bg);}

/* ── HOME VIEW ── */
.home-list{flex:1;overflow-y:auto;border:1px solid var(--border);margin:12px;scrollbar-width:none;}
.home-list::-webkit-scrollbar{display:none;}
.home-row{display:flex;border-bottom:1px solid var(--border);min-height:52px;align-items:center;}
.home-row:last-child{border-bottom:none;}
.home-num{width:52px;font-size:var(--body-fs);color:var(--muted);text-align:center;flex-shrink:0;border-right:1px solid var(--border);align-self:stretch;display:flex;align-items:center;justify-content:center;}
.home-text{flex:1;font-size:var(--body-fs);padding:12px 14px;line-height:1.5;}
.home-empty{color:var(--muted);}

/* ── TASKS VIEW ── */
.tasks-header{display:flex;justify-content:flex-end;padding:10px 14px;flex-shrink:0;}
.clear-done-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 12px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;}
.clear-done-btn:active{background:var(--text);color:var(--bg);}
.tasks-list{flex:1;overflow-y:auto;padding:0 14px;scrollbar-width:none;}
.tasks-list::-webkit-scrollbar{display:none;}
.task-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #222;}
.task-circle{width:20px;height:20px;border:1px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.task-circle.done{background:var(--text);}
.task-circle.done::after{content:'✓';color:var(--bg);font-size:11px;}
.task-text{flex:1;font-size:var(--body-fs);line-height:1.5;}
.task-text.done{color:var(--muted);text-decoration:line-through;}
.tasks-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* ── LOG VIEW ── */
.log-list{flex:1;overflow-y:auto;padding:0 14px;scrollbar-width:none;}
.log-list::-webkit-scrollbar{display:none;}
.log-row{padding:14px 0;border-bottom:1px solid #222;}
.log-text{font-size:var(--body-fs);line-height:1.5;margin-bottom:6px;}
.log-time{font-size:11px;color:var(--muted);}
.log-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* ── QUOTES VIEW ── */
.quotes-list{flex:1;overflow-y:auto;padding:0 14px;scrollbar-width:none;}
.quotes-list::-webkit-scrollbar{display:none;}
.quote-row{padding:16px 0;border-bottom:1px solid #222;}
.quote-text{font-size:var(--body-fs);line-height:1.6;margin-bottom:8px;}
.quote-footer{display:flex;align-items:center;gap:10px;}
.quote-author{font-size:11px;color:var(--muted);flex:1;}
.add-author-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:4px 8px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
.add-author-btn:disabled{opacity:0.3;cursor:default;}
.quotes-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* author input modal */
.author-modal{background:var(--bg);border:1px solid var(--border);border-bottom:none;width:100%;padding:20px 18px 32px;animation:slideUp 0.2s ease;}
.author-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:12px 14px;outline:none;margin-bottom:10px;}
.author-input::placeholder{color:var(--muted);}
.author-save{width:100%;background:var(--text);border:none;color:var(--bg);font-family:var(--mono);font-size:var(--body-fs);padding:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;}

/* ── ALERTS VIEW ── */
.alerts-list{flex:1;overflow-y:auto;padding:0 14px;scrollbar-width:none;}
.alerts-list::-webkit-scrollbar{display:none;}
.alert-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #222;}
.alert-text{flex:1;font-size:var(--body-fs);line-height:1.5;}
.alert-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px;}
.alerts-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* ── PROJECTS VIEW ── */
.proj-l1{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.proj-carousel-wrap{flex:0 0 auto;border-bottom:1px solid var(--border);overflow:hidden;position:relative;}
.proj-field-title{font-size:var(--header-fs);font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;text-align:center;padding:14px 0 10px;}
.proj-columns{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border);}
.proj-col{border-right:1px solid var(--border);min-height:160px;max-height:200px;overflow-y:auto;padding:8px;}
.proj-col:last-child{border-right:none;}
.proj-col-head{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:4px 4px 8px;text-align:center;}
.proj-card{border:1px solid var(--border);padding:8px 10px;margin-bottom:6px;font-size:var(--body-fs);line-height:1.4;cursor:pointer;position:relative;}
.proj-card:active{background:var(--text);color:var(--bg);}
.proj-card-del{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0;}
.proj-dots{display:flex;justify-content:center;gap:8px;padding:10px 0;}
.proj-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;padding:0;}
.proj-dot.active{background:var(--text);}
.proj-queue{flex:1;overflow-y:auto;scrollbar-width:none;}
.proj-queue::-webkit-scrollbar{display:none;}
.proj-queue-head{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #222;flex-shrink:0;}
.proj-queue-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.add-field-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
.queue-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #222;gap:10px;}
.queue-text{flex:1;font-size:var(--body-fs);line-height:1.4;}
.queue-actions{display:flex;gap:6px;flex-shrink:0;}
.queue-place-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;}
.queue-place-btn:active{background:var(--text);color:var(--bg);}
.queue-del-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;}
.proj-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;padding:20px;}

/* ── MEDIA VIEW ── */
.media-l1{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.media-carousel-wrap{flex:0 0 auto;border-bottom:1px solid var(--border);overflow:hidden;}
.media-field-title{font-size:var(--header-fs);font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;text-align:center;padding:14px 0 10px;}
.media-columns{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);}
.media-col{border-right:1px solid var(--border);min-height:160px;max-height:220px;overflow-y:auto;padding:8px;}
.media-col:last-child{border-right:none;}
.media-col-head{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:4px 4px 8px;text-align:center;}
.media-card{border:1px solid var(--border);padding:8px 10px;margin-bottom:6px;font-size:var(--body-fs);line-height:1.4;cursor:pointer;}
.media-card-note{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;}
.media-dots{display:flex;justify-content:center;gap:8px;padding:10px 0;}
.media-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;padding:0;}
.media-dot.active{background:var(--text);}
.media-watchlist-head{padding:8px 14px;border-bottom:1px solid #222;flex-shrink:0;}
.media-watchlist-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.media-queue{flex:1;overflow-y:auto;scrollbar-width:none;}
.media-queue::-webkit-scrollbar{display:none;}

/* ── SEED FULL EDITOR ── */
.seed-editor{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;}
.seed-editor.open{display:flex;}
.editor-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding:14px 16px;flex-shrink:0;}
.editor-back{background:none;border:none;color:var(--text);font-family:var(--mono);font-size:var(--body-fs);cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
.editor-save{background:var(--text);border:none;color:var(--bg);font-family:var(--mono);font-size:var(--body-fs);padding:8px 16px;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;}
.editor-textarea{flex:1;background:var(--bg);border:none;color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:20px 16px;outline:none;resize:none;line-height:1.7;}

/* ── ADD FIELD MODAL ── */
.field-modal{background:var(--bg);border:1px solid var(--border);border-bottom:none;width:100%;padding:20px 18px 32px;animation:slideUp 0.2s ease;}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:12px 14px;outline:none;margin-bottom:10px;text-transform:uppercase;}
.field-input::placeholder{color:var(--muted);}
.field-save{width:100%;background:var(--text);border:none;color:var(--bg);font-family:var(--mono);font-size:var(--body-fs);padding:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;}

/* scrollbar global */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-cell">FOREST</div>
  <div class="hdr-cell">V1.5</div>
  <div class="hdr-cell hdr-alerts" onclick="openAlerts()">!!!</div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('home',this)">HOME</button>
  <button class="nav-btn" onclick="switchTab('tasks',this)">TASKS</button>
  <button class="nav-btn" onclick="switchTab('projects',this)">PROJECTS</button>
  <button class="nav-btn" onclick="switchTab('log',this)">LOG</button>
  <button class="nav-btn" onclick="switchTab('quotes',this)">QUOTES</button>
  <button class="nav-btn" onclick="switchTab('media',this)">MEDIA</button>
</div>

<!-- ── HOME VIEW ── -->
<div class="view active" id="view-home">
  <div class="home-list" id="home-list"></div>
</div>

<!-- ── TASKS VIEW ── -->
<div class="view" id="view-tasks">
  <div class="tasks-header">
    <button class="clear-done-btn" onclick="clearDoneTasks()">CLEAR DONE</button>
  </div>
  <div class="tasks-list" id="tasks-list"></div>
</div>

<!-- ── PROJECTS VIEW ── -->
<div class="view" id="view-projects">
  <div class="proj-l1" id="proj-l1">
    <!-- carousel -->
    <div class="proj-carousel-wrap">
      <div class="proj-field-title" id="proj-field-title">—</div>
      <div class="proj-columns">
        <div class="proj-col" id="proj-active-col">
          <div class="proj-col-head">ACTIVE</div>
        </div>
        <div class="proj-col" id="proj-ideas-col">
          <div class="proj-col-head">IDEAS</div>
        </div>
      </div>
      <div class="proj-dots" id="proj-dots"></div>
    </div>
    <!-- queue -->
    <div class="proj-queue-head">
      <span class="proj-queue-label">QUEUE</span>
      <button class="add-field-btn" onclick="openAddField()">+ NEW FIELD</button>
    </div>
    <div class="proj-queue" id="proj-queue"></div>
  </div>
</div>

<!-- ── LOG VIEW ── -->
<div class="view" id="view-log">
  <div class="log-list" id="log-list"></div>
</div>

<!-- ── QUOTES VIEW ── -->
<div class="view" id="view-quotes">
  <div class="quotes-list" id="quotes-list"></div>
</div>

<!-- ── MEDIA VIEW ── -->
<div class="view" id="view-media">
  <div class="media-l1">
    <div class="media-carousel-wrap">
      <div class="media-field-title" id="media-field-title">—</div>
      <div class="media-columns">
        <div class="media-col" id="media-watchlist-col">
          <div class="media-col-head">WATCH LIST</div>
        </div>
        <div class="media-col" id="media-finished-col">
          <div class="media-col-head">FINISHED</div>
        </div>
      </div>
      <div class="media-dots" id="media-dots"></div>
    </div>
    <div class="media-watchlist-head">
      <span class="media-watchlist-label">NEW ENTRIES GO TO WATCH LIST</span>
    </div>
    <div class="media-queue" id="media-queue"></div>
  </div>
</div>

<!-- ── ALERTS VIEW (hidden, triggered by !!!) ── -->
<div class="view" id="view-alerts">
  <div class="alerts-list" id="alerts-list"></div>
</div>

<!-- ── BOTTOM INPUT BAR ── -->
<div class="input-bar" id="input-bar">
  <textarea class="seed-input" id="seed-input" placeholder="save seed" rows="1"></textarea>
  <button class="seed-submit" onclick="handleSeedSubmit()">▷</button>
</div>

<!-- ── CATEGORY PICKER OVERLAY ── -->
<div class="overlay" id="cat-overlay" onclick="closeCatOverlay(event)">
  <div class="modal">
    <div class="modal-label">CHOOSE SEED TYPE</div>
    <div class="cat-grid">
      <button class="cat-btn" onclick="categorize('home')">HOME</button>
      <button class="cat-btn" onclick="categorize('tasks')">TASKS</button>
      <button class="cat-btn" onclick="categorize('projects')">PROJECTS</button>
      <button class="cat-btn" onclick="categorize('log')">LOG</button>
      <button class="cat-btn" onclick="categorize('quotes')">QUOTES</button>
      <button class="cat-btn" onclick="categorize('media')">MEDIA</button>
      <button class="cat-btn full" onclick="categorize('alerts')">!!! ALERTS</button>
    </div>
  </div>
</div>

<!-- ── AUTHOR OVERLAY ── -->
<div class="overlay" id="author-overlay" onclick="closeAuthorOverlay(event)">
  <div class="author-modal">
    <div class="modal-label">WHO SAID THIS?</div>
    <input class="author-input" id="author-input" placeholder="Name..." type="text">
    <button class="author-save" onclick="saveAuthor()">SAVE</button>
  </div>
</div>

<!-- ── ADD FIELD OVERLAY ── -->
<div class="overlay" id="field-overlay" onclick="closeFieldOverlay(event)">
  <div class="field-modal">
    <div class="modal-label">NEW FIELD NAME</div>
    <input class="field-input" id="field-input" placeholder="e.g. AGRICULTURE" type="text">
    <button class="field-save" onclick="saveNewField()">CREATE FIELD</button>
  </div>
</div>

<!-- ── SEED FULL EDITOR ── -->
<div class="seed-editor" id="seed-editor">
  <div class="editor-header">
    <button class="editor-back" onclick="closeEditor()">← BACK</button>
    <button class="editor-save" onclick="saveEditorContent()">SAVE</button>
  </div>
  <textarea class="editor-textarea" id="editor-textarea" placeholder="Develop your idea here..."></textarea>
</div>

<script>
// ── STATE ──
const DEFAULT_STATE = {
  seeds: [],          // {id, text, type, ts}
  tasks: [],          // {id, text, done, ts}
  logs: [],           // {id, text, ts}
  quotes: [],         // {id, text, author, authorSet, ts}
  alerts: [],         // {id, text, ts}
  projectFields: ['WRITING','MUSIC','CODING'],  // field names in order
  projectData: {},    // fieldName -> {active:[{id,text}], ideas:[{id,text}], queue:[{id,text}]}
  mediaField: 0,      // current media carousel index
  mediaData: {        // fixed fields
    'MOVIES & SERIES': {watchlist:[],finished:[]},
    'MUSIC': {watchlist:[],finished:[]},
    'BOOKS': {watchlist:[],finished:[]}
  }
};

let S = loadState();
let pendingSeedText = '';
let currentProjField = 0;
let currentMediaField = 0;
let currentAuthorQuoteId = null;
let currentEditorSeedId = null;
let currentEditorContext = null; // {type, fieldName, col}
let prevTab = 'home';

function loadState(){
  try{
    const raw = localStorage.getItem('forest_v15');
    if(raw){
      const parsed = JSON.parse(raw);
      // ensure mediaData has all 3 fields
      if(!parsed.mediaData) parsed.mediaData = DEFAULT_STATE.mediaData;
      ['MOVIES & SERIES','MUSIC','BOOKS'].forEach(f=>{
        if(!parsed.mediaData[f]) parsed.mediaData[f]={watchlist:[],finished:[]};
      });
      if(!parsed.projectFields) parsed.projectFields = DEFAULT_STATE.projectFields;
      if(!parsed.projectData) parsed.projectData = {};
      parsed.projectFields.forEach(f=>{
        if(!parsed.projectData[f]) parsed.projectData[f]={active:[],ideas:[],queue:[]};
      });
      return parsed;
    }
  }catch(e){}
  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
  s.projectFields.forEach(f=>{ s.projectData[f]={active:[],ideas:[],queue:[]};});
  return s;
}

function save(){ localStorage.setItem('forest_v15', JSON.stringify(S)); }

// ── UTILS ──
function uid(){ return Date.now() + Math.random().toString(36).slice(2); }
function esc(t){ const d=document.createElement('div');d.textContent=t;return d.innerHTML; }
function fmtTime(ts){
  const d=new Date(ts);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${hh}:${mm} · ${days[d.getDay()]} ${d.getDate()}`;
}

// ── TAB SWITCHING ──
let currentTab = 'home';
function switchTab(tab, btn){
  if(tab === 'alerts') return;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  currentTab = tab;
  // show/hide input bar
  document.getElementById('input-bar').style.display = (tab === 'alerts') ? 'none' : 'flex';
  if(tab==='home') renderHome();
  if(tab==='tasks') renderTasks();
  if(tab==='projects') renderProjects();
  if(tab==='log') renderLog();
  if(tab==='quotes') renderQuotes();
  if(tab==='media') renderMedia();
}

function openAlerts(){
  prevTab = currentTab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-alerts').classList.add('active');
  document.getElementById('input-bar').style.display = 'none';
  currentTab = 'alerts';
  renderAlerts();
}

// ── SEED INPUT ──
const seedInput = document.getElementById('seed-input');
seedInput.addEventListener('input', ()=>{
  seedInput.style.height='auto';
  seedInput.style.height = Math.min(seedInput.scrollHeight, 80) + 'px';
});
seedInput.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSeedSubmit(); }
});

function handleSeedSubmit(){
  const txt = seedInput.value.trim();
  if(!txt) return;
  pendingSeedText = txt;
  seedInput.value = '';
  seedInput.style.height = 'auto';
  openCatOverlay();
}

// ── CATEGORY OVERLAY ──
function openCatOverlay(){ document.getElementById('cat-overlay').classList.add('open'); }
function closeCatOverlay(e){
  if(e.target===document.getElementById('cat-overlay')) document.getElementById('cat-overlay').classList.remove('open');
}

function categorize(type){
  document.getElementById('cat-overlay').classList.remove('open');
  const id = uid();
  const ts = Date.now();
  const text = pendingSeedText;
  pendingSeedText = '';

  if(type==='home'){
    S.seeds.push({id,text,type:'home',ts});
    save(); renderHome();
  } else if(type==='tasks'){
    S.tasks.push({id,text,done:false,ts});
    save(); if(currentTab==='tasks') renderTasks();
  } else if(type==='log'){
    S.logs.unshift({id,text,ts});
    save(); if(currentTab==='log') renderLog();
  } else if(type==='quotes'){
    const formatted = '\u201c' + text + '\u201d';
    S.quotes.unshift({id,text:formatted,author:'',authorSet:false,ts});
    save(); if(currentTab==='quotes') renderQuotes();
  } else if(type==='alerts'){
    S.alerts.unshift({id,text,ts});
    save(); if(currentTab==='alerts') renderAlerts();
  } else if(type==='projects'){
    const fn = S.projectFields[currentProjField];
    if(!fn) return;
    if(!S.projectData[fn]) S.projectData[fn]={active:[],ideas:[],queue:[]};
    S.projectData[fn].queue.push({id,text});
    save(); if(currentTab==='projects') renderProjects();
  } else if(type==='media'){
    const fields = ['MOVIES & SERIES','MUSIC','BOOKS'];
    const fn = fields[currentMediaField];
    S.mediaData[fn].watchlist.push({id,text,note:''});
    save(); if(currentTab==='media') renderMedia();
  }
}

// ── HOME ──
function renderHome(){
  const list = document.getElementById('home-list');
  const seeds = S.seeds.filter(s=>s.type==='home');
  list.innerHTML = '';
  for(let i=0;i<10;i++){
    const row = document.createElement('div');
    row.className = 'home-row';
    const num = document.createElement('div');
    num.className = 'home-num';
    num.textContent = i+1;
    const txt = document.createElement('div');
    txt.className = 'home-text';
    if(seeds[i]){
      txt.textContent = seeds[i].text;
    } else {
      txt.classList.add('home-empty');
    }
    row.appendChild(num);
    row.appendChild(txt);
    list.appendChild(row);
  }
}

// ── TASKS ──
function renderTasks(){
  const list = document.getElementById('tasks-list');
  list.innerHTML = '';
  if(!S.tasks.length){
    list.innerHTML = '<div class="tasks-empty">No tasks yet.</div>';
    return;
  }
  S.tasks.forEach(t=>{
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `
      <div class="task-circle${t.done?' done':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="task-text${t.done?' done':''}">${esc(t.text)}</div>
    `;
    list.appendChild(row);
  });
}
function toggleTask(id){
  const t = S.tasks.find(x=>x.id===id);
  if(t){ t.done=!t.done; save(); renderTasks(); }
}
function clearDoneTasks(){
  S.tasks = S.tasks.filter(t=>!t.done);
  save(); renderTasks();
}

// ── LOG ──
function renderLog(){
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  if(!S.logs.length){
    list.innerHTML = '<div class="log-empty">The record begins here.</div>';
    return;
  }
  S.logs.forEach(l=>{
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `<div class="log-text">${esc(l.text)}</div><div class="log-time">${fmtTime(l.ts)}</div>`;
    list.appendChild(row);
  });
}

// ── QUOTES ──
function renderQuotes(){
  const list = document.getElementById('quotes-list');
  list.innerHTML = '';
  if(!S.quotes.length){
    list.innerHTML = '<div class="quotes-empty">Words that landed on you will live here.</div>';
    return;
  }
  S.quotes.forEach(q=>{
    const row = document.createElement('div');
    row.className = 'quote-row';
    const authorHtml = q.author
      ? `<span class="quote-author">${esc(q.author)}</span>`
      : `<button class="add-author-btn" onclick="openAuthorPopup('${q.id}')"${q.authorSet?' disabled':''}>+ AUTHOR</button>`;
    row.innerHTML = `
      <div class="quote-text">${esc(q.text)}</div>
      <div class="quote-footer">${authorHtml}</div>
    `;
    list.appendChild(row);
  });
}

function openAuthorPopup(id){
  currentAuthorQuoteId = id;
  document.getElementById('author-input').value = '';
  document.getElementById('author-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('author-input').focus(),100);
}
function closeAuthorOverlay(e){
  if(e.target===document.getElementById('author-overlay')) document.getElementById('author-overlay').classList.remove('open');
}
function saveAuthor(){
  const name = document.getElementById('author-input').value.trim();
  if(!name) return;
  const q = S.quotes.find(x=>x.id===currentAuthorQuoteId);
  if(q){
    q.author = '- ' + name + '.';
    q.authorSet = true;
    save();
  }
  document.getElementById('author-overlay').classList.remove('open');
  renderQuotes();
}
document.getElementById('author-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); saveAuthor(); }
});

// ── ALERTS ──
function renderAlerts(){
  const list = document.getElementById('alerts-list');
  list.innerHTML = '';
  if(!S.alerts.length){
    list.innerHTML = '<div class="alerts-empty">No alerts.</div>';
    return;
  }
  S.alerts.forEach(a=>{
    const row = document.createElement('div');
    row.className = 'alert-row';
    row.innerHTML = `
      <div class="alert-text">${esc(a.text)}</div>
      <button class="alert-del" onclick="deleteAlert('${a.id}')">✕</button>
    `;
    list.appendChild(row);
  });
}
function deleteAlert(id){
  S.alerts = S.alerts.filter(x=>x.id!==id);
  save(); renderAlerts();
}

// ── PROJECTS ──
function renderProjects(){
  renderProjDots();
  renderProjField();
  renderProjQueue();
}

function renderProjDots(){
  const wrap = document.getElementById('proj-dots');
  wrap.innerHTML = '';
  S.projectFields.forEach((f,i)=>{
    const dot = document.createElement('button');
    dot.className = 'proj-dot' + (i===currentProjField?' active':'');
    dot.onclick = ()=>{ currentProjField=i; renderProjects(); };
    wrap.appendChild(dot);
  });
}

function renderProjField(){
  const fn = S.projectFields[currentProjField];
  document.getElementById('proj-field-title').textContent = fn || '—';
  if(!fn) return;
  const data = S.projectData[fn] || {active:[],ideas:[],queue:[]};

  // active col
  const activeCol = document.getElementById('proj-active-col');
  activeCol.innerHTML = '<div class="proj-col-head">ACTIVE</div>';
  data.active.forEach(seed=>{
    const card = document.createElement('div');
    card.className = 'proj-card';
    card.innerHTML = `${esc(seed.text)}<button class="proj-card-del" onclick="moveProjSeed('${fn}','active','ideas','${seed.id}')">→</button>`;
    card.onclick = (e)=>{ if(e.target.classList.contains('proj-card-del')) return; openEditor(seed.id,'proj-active',fn); };
    activeCol.appendChild(card);
  });

  // ideas col
  const ideasCol = document.getElementById('proj-ideas-col');
  ideasCol.innerHTML = '<div class="proj-col-head">IDEAS</div>';
  data.ideas.forEach(seed=>{
    const card = document.createElement('div');
    card.className = 'proj-card';
    card.innerHTML = `${esc(seed.text)}<button class="proj-card-del" onclick="moveProjSeed('${fn}','ideas','active','${seed.id}')">→</button>`;
    card.onclick = (e)=>{ if(e.target.classList.contains('proj-card-del')) return; openEditor(seed.id,'proj-ideas',fn); };
    ideasCol.appendChild(card);
  });
}

function moveProjSeed(fieldName, fromCol, toCol, id){
  const data = S.projectData[fieldName];
  const idx = data[fromCol].findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [seed] = data[fromCol].splice(idx,1);
  data[toCol].push(seed);
  save(); renderProjects();
}

function renderProjQueue(){
  const queue = document.getElementById('proj-queue');
  queue.innerHTML = '';
  const fn = S.projectFields[currentProjField];
  if(!fn){ queue.innerHTML='<div class="proj-empty">No fields yet. Create one.</div>'; return; }
  const data = S.projectData[fn] || {active:[],ideas:[],queue:[]};
  if(!data.queue.length){
    queue.innerHTML='<div class="proj-empty">Queue is empty.</div>';
    return;
  }
  data.queue.forEach(seed=>{
    const row = document.createElement('div');
    row.className = 'queue-row';
    row.innerHTML = `
      <div class="queue-text">${esc(seed.text)}</div>
      <div class="queue-actions">
        <button class="queue-place-btn" onclick="placeFromQueue('${fn}','${seed.id}','active')">ACTIVE</button>
        <button class="queue-place-btn" onclick="placeFromQueue('${fn}','${seed.id}','ideas')">IDEAS</button>
        <button class="queue-del-btn" onclick="deleteFromQueue('${fn}','${seed.id}')">✕</button>
      </div>
    `;
    queue.appendChild(row);
  });
}

function placeFromQueue(fieldName, id, col){
  const data = S.projectData[fieldName];
  const idx = data.queue.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [seed] = data.queue.splice(idx,1);
  data[col].push(seed);
  save(); renderProjects();
}

function deleteFromQueue(fieldName, id){
  S.projectData[fieldName].queue = S.projectData[fieldName].queue.filter(x=>x.id!==id);
  save(); renderProjects();
}

// add new field
function openAddField(){
  document.getElementById('field-input').value='';
  document.getElementById('field-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('field-input').focus(),100);
}
function closeFieldOverlay(e){
  if(e.target===document.getElementById('field-overlay')) document.getElementById('field-overlay').classList.remove('open');
}
function saveNewField(){
  const name = document.getElementById('field-input').value.trim().toUpperCase();
  if(!name) return;
  if(S.projectFields.includes(name)) return;
  S.projectFields.push(name);
  S.projectData[name] = {active:[],ideas:[],queue:[]};
  currentProjField = S.projectFields.length - 1;
  save();
  document.getElementById('field-overlay').classList.remove('open');
  renderProjects();
}
document.getElementById('field-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); saveNewField(); }
});

// swipe for projects carousel
let projTouchX = 0;
const projCarousel = document.querySelector('.proj-carousel-wrap');
projCarousel.addEventListener('touchstart',e=>{projTouchX=e.touches[0].clientX;},{passive:true});
projCarousel.addEventListener('touchend',e=>{
  const dx = e.changedTouches[0].clientX - projTouchX;
  if(Math.abs(dx)>40){
    if(dx<0 && currentProjField<S.projectFields.length-1) currentProjField++;
    else if(dx>0 && currentProjField>0) currentProjField--;
    renderProjects();
  }
},{passive:true});

// ── MEDIA ──
const MEDIA_FIELDS = ['MOVIES & SERIES','MUSIC','BOOKS'];

function renderMedia(){
  renderMediaDots();
  renderMediaField();
}

function renderMediaDots(){
  const wrap = document.getElementById('media-dots');
  wrap.innerHTML = '';
  MEDIA_FIELDS.forEach((f,i)=>{
    const dot = document.createElement('button');
    dot.className = 'media-dot' + (i===currentMediaField?' active':'');
    dot.onclick = ()=>{ currentMediaField=i; renderMedia(); };
    wrap.appendChild(dot);
  });
}

function renderMediaField(){
  const fn = MEDIA_FIELDS[currentMediaField];
  document.getElementById('media-field-title').textContent = fn;
  const data = S.mediaData[fn];

  // watchlist
  const wl = document.getElementById('media-watchlist-col');
  wl.innerHTML = '<div class="media-col-head">WATCH LIST</div>';
  data.watchlist.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'media-card';
    card.innerHTML = esc(item.text);
    card.onclick = ()=> moveToFinished(fn, item.id);
    wl.appendChild(card);
  });

  // finished
  const fin = document.getElementById('media-finished-col');
  fin.innerHTML = '<div class="media-col-head">FINISHED</div>';
  data.finished.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'media-card';
    card.innerHTML = esc(item.text) + (item.note ? `<div class="media-card-note">${esc(item.note)}</div>` : '');
    card.onclick = ()=> openEditor(item.id, 'media-finished', fn);
    fin.appendChild(card);
  });
}

function moveToFinished(fieldName, id){
  const data = S.mediaData[fieldName];
  const idx = data.watchlist.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [item] = data.watchlist.splice(idx,1);
  if(!item.note) item.note = '';
  data.finished.push(item);
  save(); renderMedia();
}

// swipe for media carousel
let mediaTouchX = 0;
const mediaCarousel = document.querySelector('.media-carousel-wrap');
mediaCarousel.addEventListener('touchstart',e=>{mediaTouchX=e.touches[0].clientX;},{passive:true});
mediaCarousel.addEventListener('touchend',e=>{
  const dx = e.changedTouches[0].clientX - mediaTouchX;
  if(Math.abs(dx)>40){
    if(dx<0 && currentMediaField<MEDIA_FIELDS.length-1) currentMediaField++;
    else if(dx>0 && currentMediaField>0) currentMediaField--;
    renderMedia();
  }
},{passive:true});

// ── SEED EDITOR ──
function openEditor(id, context, fieldName){
  currentEditorContext = {id, context, fieldName};
  let seed = null;
  if(context==='proj-active' || context==='proj-ideas'){
    const col = context==='proj-active' ? 'active' : 'ideas';
    seed = S.projectData[fieldName][col].find(x=>x.id===id);
  } else if(context==='media-finished'){
    seed = S.mediaData[fieldName].finished.find(x=>x.id===id);
  }
  if(!seed) return;
  document.getElementById('editor-textarea').value = seed.text + (seed.note ? '\n\n---\n' + seed.note : '');
  document.getElementById('seed-editor').classList.add('open');
}

function closeEditor(){
  document.getElementById('seed-editor').classList.remove('open');
  currentEditorContext = null;
}

function saveEditorContent(){
  if(!currentEditorContext) return;
  const {id, context, fieldName} = currentEditorContext;
  const val = document.getElementById('editor-textarea').value.trim();
  if(context==='proj-active' || context==='proj-ideas'){
    const col = context==='proj-active' ? 'active' : 'ideas';
    const seed = S.projectData[fieldName][col].find(x=>x.id===id);
    if(seed) seed.text = val;
  } else if(context==='media-finished'){
    const item = S.mediaData[fieldName].finished.find(x=>x.id===id);
    if(item) item.note = val;
  }
  save();
  closeEditor();
  if(currentTab==='projects') renderProjects();
  if(currentTab==='media') renderMedia();
}

// ── INIT ──
renderHome();
</script>
</body>
