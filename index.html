<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FOREST</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FOREST">
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── DARK THEME (default) ── */
:root{
  --bg:#0a0a0a;
  --text:#e8e3d8;
  --border:#4a4038;
  --muted:#6a6058;
  --surface:#111008;
  --accent:#c8a96e;
  --card:#161410;
  --mono:Menlo,'Cascadia Code','Consolas',monospace;
  --header-fs:16px;
  --body-fs:15px;
}

/* ── LIGHT THEME ── */
body.light{
  --bg:#ffffff;
  --text:#111111;
  --border:#cccccc;
  --muted:#888888;
  --surface:#f5f5f5;
  --accent:#8a6a00;
  --card:#f0f0f0;
}

/* ── SEED TYPE ACCENT COLORS ── */
:root{
  --c-tasks:#5a8ab0;
  --c-log:#5a9e8e;
  --c-quotes:#8a6ab0;
  --c-projects:#c8a96e;
  --c-media:#b06a8a;
  --c-alerts:#c87a3a;
}
body.light{
  --c-tasks:#3a6a90;
  --c-log:#3a7e6e;
  --c-quotes:#6a4a90;
  --c-projects:#8a6a00;
  --c-media:#903a6a;
  --c-alerts:#a85a1a;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{display:flex;flex-direction:column;height:100dvh;transition:background 0.3s,color 0.3s;}

/* ── HEADER ── */
.hdr{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-cell{padding:15px 10px;font-size:var(--header-fs);font-weight:bold;letter-spacing:0.08em;text-align:center;text-transform:uppercase;color:var(--text);}
.hdr-cell:not(:last-child){border-right:1px solid var(--border);}
.hdr-alerts{cursor:pointer;letter-spacing:0.2em;color:var(--c-alerts);}
.hdr-title{cursor:pointer;user-select:none;}

/* ── NAV ── */
.nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-btn{flex:1;background:none;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:11px 4px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;text-align:center;transition:color 0.15s;}
.nav-btn:last-child{border-right:none;}
.nav-btn.active{color:var(--accent);}

/* ── VIEWS ── */
.view{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}

/* ── BOTTOM INPUT BAR ── */
.input-bar{flex-shrink:0;border-top:1px solid var(--border);display:flex;}
.seed-input{flex:1;background:var(--bg);border:none;color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:15px 16px;outline:none;resize:none;line-height:1.5;}
.seed-input::placeholder{color:var(--muted);}
.seed-submit{background:none;border:none;border-left:1px solid var(--border);color:var(--accent);font-size:20px;padding:0 22px;cursor:pointer;flex-shrink:0;min-width:60px;}

/* ── OVERLAY / MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;display:none;}
.overlay.open{display:flex;align-items:flex-end;}
.modal{background:var(--bg);border:1px solid var(--border);border-bottom:none;width:100%;padding:22px 18px 38px;animation:slideUp 0.22s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-label{font-size:11px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:16px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:20px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;text-align:center;transition:background 0.15s,color 0.15s;border-left-width:3px;}
.cat-btn:active{opacity:0.7;}
.cat-btn.c-tasks{border-left-color:var(--c-tasks);}
.cat-btn.c-log{border-left-color:var(--c-log);}
.cat-btn.c-quotes{border-left-color:var(--c-quotes);}
.cat-btn.c-projects{border-left-color:var(--c-projects);}
.cat-btn.c-media{border-left-color:var(--c-media);}
.cat-btn.c-alerts{border-left-color:var(--c-alerts);}

/* ── HOME VIEW ── */
.home-list{flex:1;overflow-y:auto;padding:0;scrollbar-width:none;}
.home-list::-webkit-scrollbar{display:none;}
.home-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:58px;}
.home-accent{width:3px;flex-shrink:0;}
.home-body{flex:1;padding:13px 14px;}
.home-text{font-size:var(--body-fs);line-height:1.7;margin-bottom:4px;color:var(--text);}
.home-tag{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}
.home-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:60px;line-height:2.2;padding:0 24px;}

/* ── TASKS VIEW ── */
.tasks-header{display:flex;justify-content:flex-end;padding:12px 14px;flex-shrink:0;}
.clear-done-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 14px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;min-height:36px;}
.clear-done-btn:active{background:var(--accent);color:var(--bg);}
.tasks-list{flex:1;overflow-y:auto;padding:0 14px;scrollbar-width:none;}
.tasks-list::-webkit-scrollbar{display:none;}
.task-row{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);}
.task-circle{width:26px;height:26px;border:1px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,border-color 0.15s;min-width:26px;}
.task-circle.done{background:var(--c-tasks);border-color:var(--c-tasks);}
.task-circle.done::after{content:'✓';color:#fff;font-size:13px;}
.task-text{flex:1;font-size:var(--body-fs);line-height:1.7;}
.task-text.done{color:var(--muted);text-decoration:line-through;}
.tasks-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* ── LOG VIEW ── */
.log-list{flex:1;overflow-y:auto;padding:0;scrollbar-width:none;}
.log-list::-webkit-scrollbar{display:none;}
.log-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:58px;}
.log-accent{width:3px;flex-shrink:0;background:var(--c-log);}
.log-body{flex:1;padding:13px 14px;}
.log-text{font-size:var(--body-fs);line-height:1.7;margin-bottom:5px;color:var(--text);}
.log-time{font-size:11px;color:var(--c-log);}
.log-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* ── QUOTES VIEW ── */
.quotes-list{flex:1;overflow-y:auto;padding:0;scrollbar-width:none;}
.quotes-list::-webkit-scrollbar{display:none;}
.quote-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
.quote-accent{width:3px;flex-shrink:0;background:var(--c-quotes);}
.quote-body{flex:1;padding:15px 14px;}
.quote-text{font-size:var(--body-fs);line-height:1.8;margin-bottom:10px;color:var(--text);}
.quote-footer{display:flex;align-items:center;gap:10px;}
.quote-author{font-size:12px;color:var(--c-quotes);flex:1;}
.add-author-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 10px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;min-height:32px;}
.add-author-btn:disabled{opacity:0.25;cursor:default;}
.quotes-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;}

/* author modal */
.author-modal{background:var(--bg);border:1px solid var(--border);border-bottom:none;width:100%;padding:22px 18px 38px;animation:slideUp 0.22s ease;}
.author-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:14px;outline:none;margin-bottom:12px;}
.author-input::placeholder{color:var(--muted);}
.author-save{width:100%;background:var(--c-quotes);border:none;color:#fff;font-family:var(--mono);font-size:var(--body-fs);padding:14px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;}

/* ── ALERTS VIEW ── */
.alerts-list{flex:1;overflow-y:auto;padding:0;scrollbar-width:none;}
.alerts-list::-webkit-scrollbar{display:none;}
.alert-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:58px;}
.alert-accent{width:3px;flex-shrink:0;background:var(--c-alerts);}
.alert-body{flex:1;padding:13px 14px;display:flex;align-items:center;gap:12px;}
.alert-text{flex:1;font-size:var(--body-fs);line-height:1.7;color:var(--text);}
.alert-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;flex-shrink:0;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.alerts-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;margin-top:40px;padding:0 24px;line-height:2.2;}

/* ── PROJECTS VIEW ── */
.proj-l1{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.proj-carousel-wrap{flex:0 0 auto;border-bottom:1px solid var(--border);}
.proj-field-title{font-size:var(--header-fs);font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;text-align:center;padding:14px 0 10px;color:var(--c-projects);}
.proj-columns{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);}
.proj-col{border-right:1px solid var(--border);min-height:140px;max-height:190px;overflow-y:auto;padding:8px;}
.proj-col:last-child{border-right:none;}
.proj-col-head{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:6px 4px 10px;text-align:center;}
.proj-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--c-projects);padding:9px 28px 9px 10px;margin-bottom:6px;font-size:var(--body-fs);line-height:1.5;cursor:pointer;position:relative;}
.proj-card-move{position:absolute;top:50%;right:6px;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px;min-width:24px;min-height:24px;display:flex;align-items:center;justify-content:center;}
.proj-dots{display:flex;justify-content:center;gap:10px;padding:10px 0;}
.proj-dot{width:9px;height:9px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;padding:0;transition:background 0.15s;}
.proj-dot.active{background:var(--c-projects);border-color:var(--c-projects);}
.proj-queue-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.proj-queue-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.add-field-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 12px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;min-height:32px;}
.proj-queue{flex:1;overflow-y:auto;scrollbar-width:none;}
.proj-queue::-webkit-scrollbar{display:none;}
.queue-row{display:flex;align-items:center;padding:14px;border-bottom:1px solid var(--border);gap:10px;border-left:3px solid var(--c-projects);}
.queue-text{flex:1;font-size:var(--body-fs);line-height:1.5;color:var(--text);}
.queue-actions{display:flex;gap:6px;flex-shrink:0;}
.queue-place-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 10px;cursor:pointer;text-transform:uppercase;min-height:32px;}
.queue-place-btn:active{background:var(--c-projects);color:#fff;border-color:var(--c-projects);}
.queue-del-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 6px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;}
.proj-empty{color:var(--muted);font-size:var(--body-fs);text-align:center;padding:20px;}

/* ── MEDIA VIEW ── */
.media-l1{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.media-carousel-wrap{flex:0 0 auto;border-bottom:1px solid var(--border);}
.media-field-title{font-size:var(--header-fs);font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;text-align:center;padding:14px 0 10px;color:var(--c-media);}
.media-columns{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);}
.media-col{border-right:1px solid var(--border);min-height:140px;max-height:200px;overflow-y:auto;padding:8px;}
.media-col:last-child{border-right:none;}
.media-col-head{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:6px 4px 10px;text-align:center;}
.media-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--c-media);padding:9px 10px;margin-bottom:6px;font-size:var(--body-fs);line-height:1.5;cursor:pointer;}
.media-card-note{font-size:12px;color:var(--c-media);margin-top:5px;font-style:italic;}
.media-dots{display:flex;justify-content:center;gap:10px;padding:10px 0;}
.media-dot{width:9px;height:9px;border-radius:50%;border:1px solid var(--border);background:none;cursor:pointer;padding:0;transition:background 0.15s;}
.media-dot.active{background:var(--c-media);border-color:var(--c-media);}
.media-queue-head{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.media-queue-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.media-queue{flex:1;overflow-y:auto;scrollbar-width:none;}
.media-queue::-webkit-scrollbar{display:none;}

/* ── SEED FULL EDITOR ── */
.seed-editor{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;}
.seed-editor.open{display:flex;}
.editor-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding:15px 16px;flex-shrink:0;}
.editor-back{background:none;border:none;color:var(--text);font-family:var(--mono);font-size:var(--body-fs);cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;min-height:40px;padding:0 4px;}
.editor-save{background:var(--accent);border:none;color:var(--bg);font-family:var(--mono);font-size:var(--body-fs);padding:10px 18px;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;min-height:40px;}
.editor-textarea{flex:1;background:var(--bg);border:none;color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:20px 16px;outline:none;resize:none;line-height:1.8;}

/* ── ADD FIELD MODAL ── */
.field-modal{background:var(--bg);border:1px solid var(--border);border-bottom:none;width:100%;padding:22px 18px 38px;animation:slideUp 0.22s ease;}
.field-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:var(--body-fs);padding:14px;outline:none;margin-bottom:12px;text-transform:uppercase;}
.field-input::placeholder{color:var(--muted);}
.field-save{width:100%;background:var(--c-projects);border:none;color:#fff;font-family:var(--mono);font-size:var(--body-fs);padding:14px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;}

/* ── THEME TOGGLE ── */
.theme-toggle{position:fixed;bottom:72px;right:14px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 12px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;z-index:50;display:none;min-height:36px;}
.theme-toggle.visible{display:block;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-cell hdr-title" id="hdr-title" onclick="handleTitleTap()">FOREST</div>
  <div class="hdr-cell">V1.5</div>
  <div class="hdr-cell hdr-alerts" onclick="openAlerts()">!!!</div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('home',this)">HOME</button>
  <button class="nav-btn" onclick="switchTab('tasks',this)">TASKS</button>
  <button class="nav-btn" onclick="switchTab('projects',this)">PROJECTS</button>
  <button class="nav-btn" onclick="switchTab('log',this)">LOG</button>
  <button class="nav-btn" onclick="switchTab('quotes',this)">QUOTES</button>
  <button class="nav-btn" onclick="switchTab('media',this)">MEDIA</button>
</div>

<!-- HOME -->
<div class="view active" id="view-home">
  <div class="home-list" id="home-list"></div>
</div>

<!-- TASKS -->
<div class="view" id="view-tasks">
  <div class="tasks-header">
    <button class="clear-done-btn" onclick="clearDoneTasks()">CLEAR DONE</button>
  </div>
  <div class="tasks-list" id="tasks-list"></div>
</div>

<!-- PROJECTS -->
<div class="view" id="view-projects">
  <div class="proj-l1">
    <div class="proj-carousel-wrap">
      <div class="proj-field-title" id="proj-field-title">—</div>
      <div class="proj-columns">
        <div class="proj-col" id="proj-active-col"><div class="proj-col-head">ACTIVE</div></div>
        <div class="proj-col" id="proj-ideas-col"><div class="proj-col-head">IDEAS</div></div>
      </div>
      <div class="proj-dots" id="proj-dots"></div>
    </div>
    <div class="proj-queue-head">
      <span class="proj-queue-label">QUEUE</span>
      <button class="add-field-btn" onclick="openAddField()">+ NEW FIELD</button>
    </div>
    <div class="proj-queue" id="proj-queue"></div>
  </div>
</div>

<!-- LOG -->
<div class="view" id="view-log">
  <div class="log-list" id="log-list"></div>
</div>

<!-- QUOTES -->
<div class="view" id="view-quotes">
  <div class="quotes-list" id="quotes-list"></div>
</div>

<!-- MEDIA -->
<div class="view" id="view-media">
  <div class="media-l1">
    <div class="media-carousel-wrap">
      <div class="media-field-title" id="media-field-title">—</div>
      <div class="media-columns">
        <div class="media-col" id="media-watchlist-col"><div class="media-col-head">WATCH LIST</div></div>
        <div class="media-col" id="media-finished-col"><div class="media-col-head">FINISHED</div></div>
      </div>
      <div class="media-dots" id="media-dots"></div>
    </div>
    <div class="media-queue-head">
      <span class="media-queue-label">TAP WATCH LIST ITEM TO MARK FINISHED</span>
    </div>
    <div class="media-queue" id="media-queue"></div>
  </div>
</div>

<!-- ALERTS -->
<div class="view" id="view-alerts">
  <div class="alerts-list" id="alerts-list"></div>
</div>

<!-- INPUT BAR -->
<div class="input-bar" id="input-bar">
  <textarea class="seed-input" id="seed-input" placeholder="save seed" rows="1"></textarea>
  <button class="seed-submit" onclick="handleSeedSubmit()">▷</button>
</div>

<!-- CATEGORY PICKER — clean 2×3, no HOME -->
<div class="overlay" id="cat-overlay" onclick="closeCatOverlay(event)">
  <div class="modal">
    <div class="modal-label">CHOOSE SEED TYPE</div>
    <div class="cat-grid">
      <button class="cat-btn c-tasks"    onclick="categorize('tasks')">TASKS</button>
      <button class="cat-btn c-log"      onclick="categorize('log')">LOG</button>
      <button class="cat-btn c-quotes"   onclick="categorize('quotes')">QUOTES</button>
      <button class="cat-btn c-projects" onclick="categorize('projects')">PROJECTS</button>
      <button class="cat-btn c-media"    onclick="categorize('media')">MEDIA</button>
      <button class="cat-btn c-alerts"   onclick="categorize('alerts')">!!! ALERTS</button>
    </div>
  </div>
</div>

<!-- AUTHOR OVERLAY -->
<div class="overlay" id="author-overlay" onclick="closeAuthorOverlay(event)">
  <div class="author-modal">
    <div class="modal-label">WHO SAID THIS?</div>
    <input class="author-input" id="author-input" placeholder="Name..." type="text">
    <button class="author-save" onclick="saveAuthor()">SAVE</button>
  </div>
</div>

<!-- ADD FIELD OVERLAY -->
<div class="overlay" id="field-overlay" onclick="closeFieldOverlay(event)">
  <div class="field-modal">
    <div class="modal-label">NEW FIELD NAME</div>
    <input class="field-input" id="field-input" placeholder="e.g. AGRICULTURE" type="text">
    <button class="field-save" onclick="saveNewField()">CREATE FIELD</button>
  </div>
</div>

<!-- SEED EDITOR -->
<div class="seed-editor" id="seed-editor">
  <div class="editor-header">
    <button class="editor-back" onclick="closeEditor()">← BACK</button>
    <button class="editor-save" onclick="saveEditorContent()">SAVE</button>
  </div>
  <textarea class="editor-textarea" id="editor-textarea" placeholder="Develop your idea here..."></textarea>
</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">◐ THEME</button>

<script>
// ── AUDIO ENGINE ──
const actx = new (window.AudioContext||window.webkitAudioContext)();
const ATTACK=0.001,DECAY=0.8,SPREAD=0.105,PAUSE=0.025,BOOST=2.0,BASE_VOL=0.22;
const CHORDS={
  cmaj:{freqs:[523,659,784]},
  fmaj:{freqs:[349,440,523]},
  dmaj:{freqs:[587,740,880]},
  cext:{freqs:[523,659,784,1047]}
};
const BASE_IDS=['cmaj','fmaj','dmaj'];

function scheduleChime(freqs){
  if(actx.state==='suspended') actx.resume();
  const vol=BASE_VOL/freqs.length;
  freqs.forEach((freq,i)=>{
    const isLast=i===freqs.length-1;
    const t=actx.currentTime+i*SPREAD+(isLast?PAUSE:0);
    const v=isLast?vol*BOOST:vol;
    const osc=actx.createOscillator();
    const gain=actx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(v,t+ATTACK);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+ATTACK+DECAY);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(t); osc.stop(t+ATTACK+DECAY+0.05);
  });
}
function playTaskChime(){
  const id=Math.floor(Math.random()*6)===0?'cext':BASE_IDS[Math.floor(Math.random()*3)];
  scheduleChime(CHORDS[id].freqs);
}
function playSeedChime(){ scheduleChime(CHORDS.fmaj.freqs); }

// ── HAPTICS ──
function haptic(p){ if(navigator.vibrate) navigator.vibrate(p); }
const HAP_TAP=8, HAP_DONE=[30,20,60], HAP_SAVE=15, HAP_NAV=5;

// ── THEME ──
let isLight=localStorage.getItem('forest_theme')==='light';
function applyTheme(){ document.body.classList.toggle('light',isLight); document.getElementById('theme-toggle').textContent=isLight?'◑ THEME':'◐ THEME'; }
function toggleTheme(){ haptic(HAP_TAP); isLight=!isLight; localStorage.setItem('forest_theme',isLight?'light':'dark'); applyTheme(); }
let titleTapCount=0,titleTapTimer=null;
function handleTitleTap(){
  titleTapCount++; clearTimeout(titleTapTimer);
  titleTapTimer=setTimeout(()=>{titleTapCount=0;},600);
  if(titleTapCount>=3){ titleTapCount=0; document.getElementById('theme-toggle').classList.toggle('visible'); haptic(HAP_TAP); }
}
applyTheme();

// ── TYPE COLORS (for home feed accent bars) ──
const TYPE_COLORS={
  tasks:'var(--c-tasks)',
  log:'var(--c-log)',
  quotes:'var(--c-quotes)',
  projects:'var(--c-projects)',
  media:'var(--c-media)',
  alerts:'var(--c-alerts)'
};
const TYPE_LABELS={
  tasks:'TASK',log:'LOG',quotes:'QUOTE',
  projects:'PROJECT',media:'MEDIA',alerts:'ALERT'
};

// ── STATE ──
function loadState(){
  try{
    const raw=localStorage.getItem('forest_v15');
    if(raw){
      const p=JSON.parse(raw);
      if(!p.mediaData) p.mediaData={};
      ['MOVIES & SERIES','MUSIC','BOOKS'].forEach(f=>{ if(!p.mediaData[f]) p.mediaData[f]={watchlist:[],finished:[]}; });
      if(!p.projectFields) p.projectFields=['WRITING','MUSIC','CODING'];
      if(!p.projectData) p.projectData={};
      p.projectFields.forEach(f=>{ if(!p.projectData[f]) p.projectData[f]={active:[],ideas:[],queue:[]}; });
      if(!p.tasks) p.tasks=[];
      if(!p.logs) p.logs=[];
      if(!p.quotes) p.quotes=[];
      if(!p.alerts) p.alerts=[];
      if(!p.homeFeed) p.homeFeed=[];
      return p;
    }
  }catch(e){}
  const s={
    tasks:[],logs:[],quotes:[],alerts:[],homeFeed:[],
    projectFields:['WRITING','MUSIC','CODING'],
    projectData:{},
    mediaData:{'MOVIES & SERIES':{watchlist:[],finished:[]},'MUSIC':{watchlist:[],finished:[]},'BOOKS':{watchlist:[],finished:[]}}
  };
  s.projectFields.forEach(f=>{s.projectData[f]={active:[],ideas:[],queue:[]};});
  return s;
}
let S=loadState();
function save(){ localStorage.setItem('forest_v15',JSON.stringify(S)); }
function uid(){ return Date.now()+Math.random().toString(36).slice(2); }
function esc(t){ const d=document.createElement('div');d.textContent=t;return d.innerHTML; }
function fmtTime(ts){
  const d=new Date(ts);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${hh}:${mm} · ${days[d.getDay()]} ${d.getDate()}`;
}

// ── HOME FEED ──
function addToHomeFeed(text,type){
  if(!S.homeFeed) S.homeFeed=[];
  S.homeFeed.unshift({id:uid(),text,type,ts:Date.now()});
  if(S.homeFeed.length>15) S.homeFeed=S.homeFeed.slice(0,15);
}
function renderHome(){
  const list=document.getElementById('home-list');
  list.innerHTML='';
  if(!S.homeFeed||!S.homeFeed.length){
    list.innerHTML='<div class="home-empty">Your 15 most recent seeds<br>will appear here.</div>';
    return;
  }
  S.homeFeed.forEach(item=>{
    const row=document.createElement('div');
    row.className='home-row';
    const color=TYPE_COLORS[item.type]||'var(--muted)';
    const label=TYPE_LABELS[item.type]||item.type;
    row.innerHTML=`
      <div class="home-accent" style="background:${color};"></div>
      <div class="home-body">
        <div class="home-text">${esc(item.text)}</div>
        <div class="home-tag" style="color:${color};">${label}</div>
      </div>`;
    list.appendChild(row);
  });
}

// ── TAB SWITCHING ──
let currentTab='home';
function switchTab(tab,btn){
  haptic(HAP_NAV);
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  currentTab=tab;
  document.getElementById('input-bar').style.display='flex';
  if(tab==='home') renderHome();
  if(tab==='tasks') renderTasks();
  if(tab==='projects') renderProjects();
  if(tab==='log') renderLog();
  if(tab==='quotes') renderQuotes();
  if(tab==='media') renderMedia();
}
function openAlerts(){
  haptic(HAP_TAP);
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-alerts').classList.add('active');
  document.getElementById('input-bar').style.display='none';
  currentTab='alerts';
  renderAlerts();
}

// ── SEED INPUT ──
const seedInput=document.getElementById('seed-input');
seedInput.addEventListener('input',()=>{
  seedInput.style.height='auto';
  seedInput.style.height=Math.min(seedInput.scrollHeight,80)+'px';
});
seedInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSeedSubmit();} });

let pendingSeedText='';
function handleSeedSubmit(){
  const txt=seedInput.value.trim();
  if(!txt) return;
  pendingSeedText=txt;
  seedInput.value=''; seedInput.style.height='auto';
  haptic(HAP_TAP);
  openCatOverlay();
}

// ── CATEGORY OVERLAY ──
function openCatOverlay(){ document.getElementById('cat-overlay').classList.add('open'); }
function closeCatOverlay(e){ if(e.target===document.getElementById('cat-overlay')) document.getElementById('cat-overlay').classList.remove('open'); }

function categorize(type){
  haptic(HAP_SAVE);
  document.getElementById('cat-overlay').classList.remove('open');
  const id=uid(),ts=Date.now(),text=pendingSeedText;
  pendingSeedText='';
  addToHomeFeed(text,type);

  if(type==='tasks'){
    S.tasks.push({id,text,done:false,ts});
    if(currentTab==='tasks') renderTasks();
  } else if(type==='log'){
    S.logs.unshift({id,text,ts});
    if(currentTab==='log') renderLog();
  } else if(type==='quotes'){
    S.quotes.unshift({id,text:'\u201c'+text+'\u201d',author:'',authorSet:false,ts});
    if(currentTab==='quotes') renderQuotes();
  } else if(type==='alerts'){
    S.alerts.unshift({id,text,ts});
    if(currentTab==='alerts') renderAlerts();
  } else if(type==='projects'){
    const fn=S.projectFields[currentProjField];
    if(fn){
      if(!S.projectData[fn]) S.projectData[fn]={active:[],ideas:[],queue:[]};
      S.projectData[fn].queue.push({id,text});
      if(currentTab==='projects') renderProjects();
    }
  } else if(type==='media'){
    const fn=MEDIA_FIELDS[currentMediaField];
    S.mediaData[fn].watchlist.push({id,text,note:''});
    if(currentTab==='media') renderMedia();
  }
  save(); playSeedChime();
  if(currentTab==='home') renderHome();
}

// ── TASKS ──
function renderTasks(){
  const list=document.getElementById('tasks-list');
  list.innerHTML='';
  if(!S.tasks.length){ list.innerHTML='<div class="tasks-empty">No tasks yet.</div>'; return; }
  S.tasks.forEach(t=>{
    const row=document.createElement('div');
    row.className='task-row';
    row.innerHTML=`
      <div class="task-circle${t.done?' done':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="task-text${t.done?' done':''}">${esc(t.text)}</div>`;
    list.appendChild(row);
  });
}
function toggleTask(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done=!t.done; save(); renderTasks();
  if(t.done){ playTaskChime(); haptic(HAP_DONE); } else { haptic(HAP_TAP); }
}
function clearDoneTasks(){ haptic(HAP_TAP); S.tasks=S.tasks.filter(t=>!t.done); save(); renderTasks(); }

// ── LOG ──
function renderLog(){
  const list=document.getElementById('log-list');
  list.innerHTML='';
  if(!S.logs.length){ list.innerHTML='<div class="log-empty">The record begins here.</div>'; return; }
  S.logs.forEach(l=>{
    const row=document.createElement('div');
    row.className='log-row';
    row.innerHTML=`<div class="log-accent"></div><div class="log-body"><div class="log-text">${esc(l.text)}</div><div class="log-time">${fmtTime(l.ts)}</div></div>`;
    list.appendChild(row);
  });
}

// ── QUOTES ──
function renderQuotes(){
  const list=document.getElementById('quotes-list');
  list.innerHTML='';
  if(!S.quotes.length){ list.innerHTML='<div class="quotes-empty">Words that landed will live here.</div>'; return; }
  S.quotes.forEach(q=>{
    const row=document.createElement('div');
    row.className='quote-row';
    const authorHtml=q.author
      ?`<span class="quote-author">${esc(q.author)}</span>`
      :`<button class="add-author-btn"${q.authorSet?' disabled':''} onclick="openAuthorPopup('${q.id}')">+ AUTHOR</button>`;
    row.innerHTML=`<div class="quote-accent"></div><div class="quote-body"><div class="quote-text">${esc(q.text)}</div><div class="quote-footer">${authorHtml}</div></div>`;
    list.appendChild(row);
  });
}
let currentAuthorQuoteId=null;
function openAuthorPopup(id){ haptic(HAP_TAP); currentAuthorQuoteId=id; document.getElementById('author-input').value=''; document.getElementById('author-overlay').classList.add('open'); setTimeout(()=>document.getElementById('author-input').focus(),100); }
function closeAuthorOverlay(e){ if(e.target===document.getElementById('author-overlay')) document.getElementById('author-overlay').classList.remove('open'); }
function saveAuthor(){
  const name=document.getElementById('author-input').value.trim();
  if(!name) return;
  const q=S.quotes.find(x=>x.id===currentAuthorQuoteId);
  if(q){ q.author='- '+name+'.'; q.authorSet=true; save(); }
  document.getElementById('author-overlay').classList.remove('open');
  haptic(HAP_SAVE); renderQuotes();
}
document.getElementById('author-input').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();saveAuthor();} });

// ── ALERTS ──
function renderAlerts(){
  const list=document.getElementById('alerts-list');
  list.innerHTML='';
  if(!S.alerts.length){ list.innerHTML='<div class="alerts-empty">Anchors and urgencies live here.</div>'; return; }
  S.alerts.forEach(a=>{
    const row=document.createElement('div');
    row.className='alert-row';
    row.innerHTML=`<div class="alert-accent"></div><div class="alert-body"><div class="alert-text">${esc(a.text)}</div><button class="alert-del" onclick="deleteAlert('${a.id}')">✕</button></div>`;
    list.appendChild(row);
  });
}
function deleteAlert(id){ haptic(HAP_TAP); S.alerts=S.alerts.filter(x=>x.id!==id); save(); renderAlerts(); }

// ── PROJECTS ──
let currentProjField=0;
function renderProjects(){ renderProjDots(); renderProjField(); renderProjQueue(); }
function renderProjDots(){
  const wrap=document.getElementById('proj-dots');
  wrap.innerHTML='';
  S.projectFields.forEach((f,i)=>{
    const dot=document.createElement('button');
    dot.className='proj-dot'+(i===currentProjField?' active':'');
    dot.onclick=()=>{ haptic(HAP_NAV); currentProjField=i; renderProjects(); };
    wrap.appendChild(dot);
  });
}
function renderProjField(){
  const fn=S.projectFields[currentProjField];
  document.getElementById('proj-field-title').textContent=fn||'—';
  if(!fn) return;
  const data=S.projectData[fn]||{active:[],ideas:[],queue:[]};
  const activeCol=document.getElementById('proj-active-col');
  activeCol.innerHTML='<div class="proj-col-head">ACTIVE</div>';
  data.active.forEach(seed=>{
    const card=document.createElement('div');
    card.className='proj-card';
    card.innerHTML=`${esc(seed.text)}<button class="proj-card-move" onclick="event.stopPropagation();moveProjSeed('${fn}','active','ideas','${seed.id}')">→</button>`;
    card.onclick=(e)=>{ if(e.target.classList.contains('proj-card-move')) return; openEditor(seed.id,'proj-active',fn); };
    activeCol.appendChild(card);
  });
  const ideasCol=document.getElementById('proj-ideas-col');
  ideasCol.innerHTML='<div class="proj-col-head">IDEAS</div>';
  data.ideas.forEach(seed=>{
    const card=document.createElement('div');
    card.className='proj-card';
    card.innerHTML=`${esc(seed.text)}<button class="proj-card-move" onclick="event.stopPropagation();moveProjSeed('${fn}','ideas','active','${seed.id}')">→</button>`;
    card.onclick=(e)=>{ if(e.target.classList.contains('proj-card-move')) return; openEditor(seed.id,'proj-ideas',fn); };
    ideasCol.appendChild(card);
  });
}
function moveProjSeed(fieldName,fromCol,toCol,id){
  haptic(HAP_TAP);
  const data=S.projectData[fieldName];
  const idx=data[fromCol].findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [seed]=data[fromCol].splice(idx,1);
  data[toCol].push(seed); save(); renderProjects();
}
function renderProjQueue(){
  const queue=document.getElementById('proj-queue');
  queue.innerHTML='';
  const fn=S.projectFields[currentProjField];
  if(!fn){ queue.innerHTML='<div class="proj-empty">No fields yet.</div>'; return; }
  const data=S.projectData[fn]||{active:[],ideas:[],queue:[]};
  if(!data.queue.length){ queue.innerHTML='<div class="proj-empty">Queue is empty.</div>'; return; }
  data.queue.forEach(seed=>{
    const row=document.createElement('div');
    row.className='queue-row';
    row.innerHTML=`
      <div class="queue-text">${esc(seed.text)}</div>
      <div class="queue-actions">
        <button class="queue-place-btn" onclick="placeFromQueue('${fn}','${seed.id}','active')">ACTIVE</button>
        <button class="queue-place-btn" onclick="placeFromQueue('${fn}','${seed.id}','ideas')">IDEAS</button>
        <button class="queue-del-btn" onclick="deleteFromQueue('${fn}','${seed.id}')">✕</button>
      </div>`;
    queue.appendChild(row);
  });
}
function placeFromQueue(fieldName,id,col){
  haptic(HAP_SAVE);
  const data=S.projectData[fieldName];
  const idx=data.queue.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [seed]=data.queue.splice(idx,1);
  data[col].push(seed); save(); renderProjects();
}
function deleteFromQueue(fieldName,id){ haptic(HAP_TAP); S.projectData[fieldName].queue=S.projectData[fieldName].queue.filter(x=>x.id!==id); save(); renderProjects(); }
function openAddField(){ haptic(HAP_TAP); document.getElementById('field-input').value=''; document.getElementById('field-overlay').classList.add('open'); setTimeout(()=>document.getElementById('field-input').focus(),100); }
function closeFieldOverlay(e){ if(e.target===document.getElementById('field-overlay')) document.getElementById('field-overlay').classList.remove('open'); }
function saveNewField(){
  const name=document.getElementById('field-input').value.trim().toUpperCase();
  if(!name||S.projectFields.includes(name)) return;
  S.projectFields.push(name); S.projectData[name]={active:[],ideas:[],queue:[]};
  currentProjField=S.projectFields.length-1; save(); haptic(HAP_SAVE);
  document.getElementById('field-overlay').classList.remove('open'); renderProjects();
}
document.getElementById('field-input').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();saveNewField();} });
document.querySelector('.proj-carousel-wrap').addEventListener('touchstart',e=>{projTouchX=e.touches[0].clientX;},{passive:true});
document.querySelector('.proj-carousel-wrap').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-projTouchX;
  if(Math.abs(dx)>40){ if(dx<0&&currentProjField<S.projectFields.length-1) currentProjField++; else if(dx>0&&currentProjField>0) currentProjField--; haptic(HAP_NAV); renderProjects(); }
},{passive:true});
let projTouchX=0;

// ── MEDIA ──
const MEDIA_FIELDS=['MOVIES & SERIES','MUSIC','BOOKS'];
let currentMediaField=0;
function renderMedia(){ renderMediaDots(); renderMediaField(); }
function renderMediaDots(){
  const wrap=document.getElementById('media-dots');
  wrap.innerHTML='';
  MEDIA_FIELDS.forEach((f,i)=>{
    const dot=document.createElement('button');
    dot.className='media-dot'+(i===currentMediaField?' active':'');
    dot.onclick=()=>{ haptic(HAP_NAV); currentMediaField=i; renderMedia(); };
    wrap.appendChild(dot);
  });
}
function renderMediaField(){
  const fn=MEDIA_FIELDS[currentMediaField];
  document.getElementById('media-field-title').textContent=fn;
  const data=S.mediaData[fn];
  const wl=document.getElementById('media-watchlist-col');
  wl.innerHTML='<div class="media-col-head">WATCH LIST</div>';
  data.watchlist.forEach(item=>{
    const card=document.createElement('div');
    card.className='media-card';
    card.innerHTML=esc(item.text);
    card.onclick=()=>{ haptic(HAP_TAP); moveToFinished(fn,item.id); };
    wl.appendChild(card);
  });
  const fin=document.getElementById('media-finished-col');
  fin.innerHTML='<div class="media-col-head">FINISHED</div>';
  data.finished.forEach(item=>{
    const card=document.createElement('div');
    card.className='media-card';
    card.innerHTML=esc(item.text)+(item.note?`<div class="media-card-note">${esc(item.note)}</div>`:'');
    card.onclick=()=>openEditor(item.id,'media-finished',fn);
    fin.appendChild(card);
  });
}
function moveToFinished(fieldName,id){
  const data=S.mediaData[fieldName];
  const idx=data.watchlist.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [item]=data.watchlist.splice(idx,1);
  if(!item.note) item.note='';
  data.finished.push(item); save(); renderMedia();
}
let mediaTouchX=0;
document.querySelector('.media-carousel-wrap').addEventListener('touchstart',e=>{mediaTouchX=e.touches[0].clientX;},{passive:true});
document.querySelector('.media-carousel-wrap').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-mediaTouchX;
  if(Math.abs(dx)>40){ if(dx<0&&currentMediaField<MEDIA_FIELDS.length-1) currentMediaField++; else if(dx>0&&currentMediaField>0) currentMediaField--; haptic(HAP_NAV); renderMedia(); }
},{passive:true});

// ── SEED EDITOR ──
let currentEditorContext=null;
function openEditor(id,context,fieldName){
  haptic(HAP_TAP); currentEditorContext={id,context,fieldName};
  let seed=null;
  if(context==='proj-active'||context==='proj-ideas'){
    const col=context==='proj-active'?'active':'ideas';
    seed=S.projectData[fieldName][col].find(x=>x.id===id);
  } else if(context==='media-finished'){
    seed=S.mediaData[fieldName].finished.find(x=>x.id===id);
  }
  if(!seed) return;
  document.getElementById('editor-textarea').value=seed.text+(seed.note?'\n\n---\n'+seed.note:'');
  document.getElementById('seed-editor').classList.add('open');
}
function closeEditor(){ haptic(HAP_TAP); document.getElementById('seed-editor').classList.remove('open'); currentEditorContext=null; }
function saveEditorContent(){
  if(!currentEditorContext) return;
  const {id,context,fieldName}=currentEditorContext;
  const val=document.getElementById('editor-textarea').value.trim();
  if(context==='proj-active'||context==='proj-ideas'){
    const col=context==='proj-active'?'active':'ideas';
    const seed=S.projectData[fieldName][col].find(x=>x.id===id);
    if(seed) seed.text=val;
  } else if(context==='media-finished'){
    const item=S.mediaData[fieldName].finished.find(x=>x.id===id);
    if(item) item.note=val;
  }
  save(); haptic(HAP_SAVE); closeEditor();
  if(currentTab==='projects') renderProjects();
  if(currentTab==='media') renderMedia();
}

// ── SERVICE WORKER ──
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/ForestLines/sw.js').catch(()=>{}); }

// ── INIT ──
renderHome();
</script>
